<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<body class="bg-light p-5">
    <div class="d-flex justify-content-between align-items-center">
        <h2>⚡ Admin Dashboard</h2>
        <a href="/" class="btn btn-outline-dark">Trang chủ</a>
    </div>
    
    <div class="card p-4 mt-3 shadow-sm">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Khách</th>
                    <th>Loại phòng</th>
                    <th>Số bàn</th>
                    <th>Thời gian</th>
                    <th>Thành tiền</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for b in bookings if b.status == 'pending' %}
                <tr>
                    <td>{{ b.name }}</td>
                    <td><span class="badge bg-info text-dark">{{ b.room_type|capitalize }}</span></td>
                    <td><strong>{{ b.table }}</strong></td>
                    <td>{{ b.date }} | {{ b.time }}</td>
                    <td>{{ b.price }} VNĐ</td>
                    <td>
                        <a href="/confirm/{{ b.id }}" class="btn btn-success btn-sm">Duyệt Đơn</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
