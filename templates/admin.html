<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<body class="bg-light p-5">
    <div class="d-flex justify-content-between align-items-center">
        <h2>⚡ Admin Dashboard</h2>
        <div>
            <a href="/admin/history" class="btn btn-info">Xem lịch sử</a>
            <a href="/" class="btn btn-outline-dark">Trang chủ</a>
        </div>
    </div>
    
    <div class="card p-4 mt-3 shadow-sm">
        <h5>Đơn chờ duyệt</h5>
        <table class="table table-hover">
            <thead class="table-dark"><tr><th>Khách</th><th>Bàn</th><th>Thời gian</th><th>Action</th></tr></thead>
            <tbody>
                {% for b in pending %}
                <tr><td>{{ b.name }}</td><td>{{ b.table }}</td><td>{{ b.date }}</td><td>Chờ thanh toán</td></tr>
                {% endfor %}
            </tbody>
        </table>
        
        <h5 class="mt-4">Đơn đã xác nhận (Đang sử dụng)</h5>
        <table class="table table-hover">
            <thead class="table-success"><tr><th>Khách</th><th>Bàn</th><th>Action</th></tr></thead>
            <tbody>
                {% for b in confirmed %}
                <tr><td>{{ b.name }}</td><td>{{ b.table }}</td><td><a href="/admin/checkout/{{ b.id }}" class="btn btn-warning btn-sm">Check-out</a></td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
