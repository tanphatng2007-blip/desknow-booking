<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>DeskNow Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(45deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            font-family: 'Segoe UI', sans-serif;
        }
        .card { 
            border-radius: 30px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            border: none; 
            background: rgba(255, 255, 255, 0.9);
        }
        h2 { font-weight: bold; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-5 mx-auto" style="max-width: 500px;">
        <h2 class="text-center mb-4">🚀 DeskNow Booking</h2>
        <form method="POST">
            <input name="name" class="form-control mb-3" placeholder="Họ tên của bạn" required>
            <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
            
            <div class="row">
                <div class="col-md-6"><input type="date" name="date" class="form-control mb-3" required></div>
                <div class="col-md-6"><input type="time" name="time" class="form-control mb-3" required></div>
            </div>
            
            <select name="room_type" class="form-select mb-3" required>
                <option value="" disabled selected>Chọn loại phòng</option>
                <option value="public">Public Room (10k/h)</option>
                <option value="private">Private Room (15k/h)</option>
                <option value="couple">Couple Room (25k/h)</option>
            </select>
            
            <input type="number" name="hours" class="form-control mb-3" placeholder="Số giờ đặt" required min="1">
            <button type="submit" class="btn btn-dark w-100 p-2 mt-2">Đặt Bàn Ngay</button>
        </form>
    </div>
</div>

</body>
</html>
