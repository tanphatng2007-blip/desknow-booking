<!DOCTYPE html>
<html lang="vi">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle, #24243e, #302b63, #0f0c29); min-height: 100vh; color: white; display: flex; align-items: center; justify-content: center; }
        .payment-card { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); border-radius: 30px; padding: 40px; border: 2px solid rgba(255,255,255,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; width: 100%; max-width: 450px; }
        .qr-box { background: white; padding: 15px; border-radius: 20px; display: inline-block; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="payment-card">
        <h2 class="text-warning">Xác nhận thanh toán</h2>
        <p>Tổng tiền cần thanh toán cho <strong>{{ data.name }}</strong>:</p>
        <h1 class="display-4 fw-bold text-success">{{ data.price }} VNĐ</h1>
        
        <div class="qr-box">
            <img src="https://img.vietqr.io/image/MB-06665089226688-compact.png?amount={{ data.price }}&addInfo=DeskNow {{ data.name }}" width="250">
        </div>
        
        <div class="spinner-border text-info" role="status"></div>
        <p class="mt-3">Vui lòng quét mã. Hệ thống đang chờ Admin xác nhận...</p>
    </div>

    <script>
        // Tự động thoát về trang chủ sau 5 phút (300,000 miligiây)
        setTimeout(() => {
            fetch('/cancel-booking/{{ data.id }}');
            alert("Đã hết thời gian thanh toán, hệ thống sẽ quay lại trang chủ.");
            window.location.href = "/";
        }, 300000);

        // Kiểm tra trạng thái đơn hàng mỗi 1.5 giây
        setInterval(() => {
            fetch('/check-status/{{ data.id }}')
                .then(r => r.json())
                .then(d => {
                    if (d.status === 'confirmed') {
                        window.location.href = "/success";
                    }
                });
        }, 1500);
    </script>
</body>
</html>
