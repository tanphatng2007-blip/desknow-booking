<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<body class="bg-light p-5">
    <h2>📜 Lịch sử giao dịch</h2>
    <table class="table table-striped mt-3 bg-white">
        <thead><tr><th>Khách</th><th>Bàn</th><th>Thời gian đặt</th><th>Thời gian thanh toán</th><th>Trạng thái</th></tr></thead>
        <tbody>
            {% for b in history %}
            <tr>
                <td>{{ b.name }}</td><td>{{ b.table }}</td><td>{{ b.date }}</td>
                <td>{{ b.confirmed_at }}</td><td><span class="badge bg-success">Đã hoàn thành</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/admin" class="btn btn-primary">Quay lại Admin</a>
</body>
